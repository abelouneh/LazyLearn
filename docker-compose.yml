version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: lazy_learn_mysql
    environment:
      MYSQL_DATABASE: 'lazy_learn_db'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lazy_learn_pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ''
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mysql_data: