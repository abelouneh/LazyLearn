services:
  # 1. The Database Container
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: lazy_learn_db
      MYSQL_ROOT_PASSWORD:
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. The Django Backend Container
  backend:
    build: ./lazy_learn_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: on-failure 

  # 3. The React + Nginx Frontend Container
  frontend:
    build: ./lazy_learn_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: